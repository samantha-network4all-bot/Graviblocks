name: Graviblocks
options:
  bundleIdPrefix: com.bimboware
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
targets:
  Graviblocks:
    type: application
    platform: macOS
    scheme:
      gatherCoverageData: false
    sources:
      - path: Graviblocks
    settings:
      base:
        PRODUCT_NAME: Graviblocks
        PRODUCT_BUNDLE_IDENTIFIER: com.bimboware.graviblocks
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ARCHS: "arm64 x86_64"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Graviblocks/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: Graviblocks/Info.plist
      properties:
        CFBundleDisplayName: Graviblocks
        CFBundleIdentifier: com.bimboware.graviblocks
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - txt
            CFBundleTypeIconFile: ""
        CFBundleName: Graviblocks
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
